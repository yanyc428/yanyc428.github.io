{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="preload" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css"></noscript>

<!-- Support for Font Awesome -->
 <link rel="preload" href="{{ base_path }}/assets/css/fontawesome.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ base_path }}/assets/css/fontawesome.css"></noscript>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="var(--global-bg-color)"/>

<!-- Custom styling for publication cards (theme-aware: adapts to light/dark) -->
<style>
  /* Section headings (publication categories) */
  #main .archive > h2,
  .page__content > h2 {
    font-size: 1.05em;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--global-text-color-light);
    border-bottom: 2px solid var(--global-border-color);
    padding-bottom: 0.35em;
    margin: 1.8em 0 1em;
  }

  /* Publication card */
  .pub-card {
    padding: 0.55em 0 0.95em 0;
    border-bottom: 1px solid var(--global-border-color);
  }
  .list__item:last-child .pub-card { border-bottom: none; }

  .pub-meta {
    display: flex;
    align-items: baseline;
    gap: 0.6em;
    margin-bottom: 0.15em;
  }
  .pub-venue {
    display: inline-block;
    font-size: 0.72em;
    font-weight: 700;
    letter-spacing: 0.02em;
    color: var(--global-link-color);
    background: transparent;
    border: 1px solid var(--global-link-color);
    border-radius: 5px;
    padding: 0.12em 0.6em;
    white-space: nowrap;
  }
  .pub-year {
    font-size: 0.78em;
    color: var(--global-text-color-light);
    font-variant-numeric: tabular-nums;
  }

  .pub-title {
    font-size: 1.04em;
    line-height: 1.35;
    font-weight: 600;
    margin: 0.1em 0 0.25em;
  }
  .pub-title a { color: var(--global-text-color); text-decoration: none; }
  .pub-title a:hover { color: var(--global-link-color); text-decoration: underline; }

  .pub-authors {
    font-size: 0.86em;
    line-height: 1.5;
    color: var(--global-text-color-light);
    margin: 0.15em 0;
  }
  .pub-authors b { color: var(--global-text-color); font-weight: 700; }

  .pub-tldr {
    font-size: 0.88em;
    line-height: 1.5;
    color: var(--global-text-color);
    opacity: 0.85;
    margin: 0.3em 0 0.45em;
    padding-left: 0.75em;
    border-left: 3px solid var(--global-link-color);
  }

  .pub-link {
    display: inline-block;
    font-size: 0.8em;
    font-weight: 600;
    color: var(--global-link-color);
    text-decoration: none;
  }
  .pub-link:hover { text-decoration: underline; }
</style>

<!-- end custom head snippets -->
